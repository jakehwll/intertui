<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>intertui</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    html { color-scheme: dark; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    body { padding: 1rem 1rem 0px; }
    #terminal { height: 100%; }
    * { box-sizing: border-box; }
    * { scrollbar-width: thin; scrollbar-color: #333 #000; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="./socketio.js"></script>
  <script src="./wasm_exec.js"></script>
  <script>
    const fit = new FitAddon.FitAddon();
    const term = new Terminal({
      cursorBlink: true,
      convertEol: true,
      fontSize: 14,
      fontFamily: "Menlo, Monaco, 'Courier New', monospace",
      theme: { background: "#000", foreground: "#ccc" },
    });
    term.loadAddon(fit);
    term.open(document.getElementById("terminal"));
    fit.fit();
    term.focus();
    window.addEventListener("resize", () => fit.fit());

    requestAnimationFrame(() => {
      fit.fit();
      globalThis.term = term;
      term.clear();

      const go = new Go();
      WebAssembly.instantiateStreaming(fetch("./intertui.wasm"), go.importObject)
        .then((r) => go.run(r.instance))
        .catch((err) => console.error(err));
    });
  </script>
</body>
</html>
